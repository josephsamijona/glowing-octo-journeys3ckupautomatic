version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# S3 Backup Flow — JHBridge
#
# Services:
#   api      → FastAPI HTTP server  (port 8000)
#   worker   → Celery worker        (concurrency=1, max 300MB RAM)
#   beat     → Celery Beat scheduler (9h / 21h UTC — fires 2×/day only)
#
# Redis & all AWS resources are external (Railway / AWS).
# SERVICE env var is read by entrypoint.sh to select which process to start.
# ─────────────────────────────────────────────────────────────────────────────

x-app-base: &app-base
  build: .
  env_file: .env
  restart: unless-stopped

services:

  # ── FastAPI server ─────────────────────────────────────────────────────────
  api:
    <<: *app-base
    container_name: s3bf-api
    environment:
      SERVICE: api
    ports:
      - "8000:8000"
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery worker ──────────────────────────────────────────────────────────
  # concurrency=1 : one backup at a time (enforced here AND via Redis lock)
  # mem_limit     : killed by Docker if worker leaks past 400MB
  worker:
    <<: *app-base
    container_name: s3bf-worker
    environment:
      SERVICE: worker
    mem_limit: 400m
    memswap_limit: 400m

  # ── Celery Beat (cron scheduler) ───────────────────────────────────────────
  # Beat only sends task messages to Redis — it does NOT execute backups.
  # Kept at 128MB because it does almost nothing between 9h and 21h.
  beat:
    <<: *app-base
    container_name: s3bf-beat
    environment:
      SERVICE: beat
    mem_limit: 128m
    memswap_limit: 128m
